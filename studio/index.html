<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WallyCAD Visual Studio | LKA Enterprise</title>
    <style>
        /* WALLY ENGINE UI STYLES */
        body {
            background-color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            margin: 0;
            padding: 2%;
            display: flex;
            justify-content: center;
        }
        .master-block {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border: 3px solid #000;
            padding: 30px;
            box-shadow: 8px 8px 0px #000;
        }
        header {
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 2em; letter-spacing: 2px; text-transform: uppercase; }
        .subtitle { font-weight: bold; color: #555; margin-top: 5px; }
        
        /* THE VIEWPORT */
        .canvas-container {
            background: #111; /* Dark Mode Drafting Board */
            border: 2px solid #000;
            margin-bottom: 20px;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 400px;
        }

        /* I/O CONTROLS */
        textarea {
            width: 100%;
            height: 150px;
            background: #f4f4f4;
            border: 2px solid #000;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #444; }
        
        /* LOGGING */
        .status-log {
            margin-top: 20px;
            border: 1px solid #000;
            padding: 15px;
            background: #fafafa;
            font-size: 0.9em;
            height: 120px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="master-block">
    <header>
        <h1>WALLYCAD STUDIO</h1>
        <div class="subtitle">LIVE RENDER & COORDINATE LOG [V1.0]</div>
    </header>

    <div class="canvas-container">
        <canvas id="viewport" width="840" height="400"></canvas>
    </div>

    <div>
        <label for="wallyInput"><strong>INPUT: WALLY PARAMETRIC PAYLOAD</strong></label>
        <textarea id="wallyInput" placeholder="Enter Wally Elements here to render...&#10;&#10;Example:&#10;Wally Box 1,1 / 17,8.5&#10;Wally Circle 2.5,2.5 / 0.5"></textarea>
    </div>

    <div class="controls">
        <button onclick="executeEngine()">RENDER TO VIEWPORT</button>
        <span id="outputStatus" style="font-weight: bold; color: #555;">STATUS: WAITING FOR PAYLOAD</span>
    </div>

    <div class="status-log" id="coordLog">
        <strong>COORDINATE LOG:</strong><br>
        <span style="color:#666;">Matrix is empty.</span>
    </div>
</div>

<script>
    // ----------------------------------------------------
    // THE ENGINE BRIDGE: SYNTAX TO VISUAL MATRIX
    // ----------------------------------------------------
    let wallyMatrix = [];
    const scale = 25; // 1 Wally Unit = 25 Pixels on screen

    function executeEngine() {
        const input = document.getElementById('wallyInput').value;
        const lines = input.split('\n');
        const logBox = document.getElementById('coordLog');
        
        // Wipe the previous matrix clean
        wallyMatrix = [];
        let logText = "<strong>COORDINATE LOG:</strong><br>";
        let entityCount = 0;

        lines.forEach(line => {
            line = line.trim();
            if (!line || !line.startsWith("Wally")) return;

            // 1. INTERPRET: LINE
            if (line.startsWith("Wally Line")) {
                let coords = line.replace("Wally Line", "").trim().split("/");
                if (coords.length === 2) {
                    let start = coords[0].split(",");
                    let end = coords[1].split(",");
                    if (start.length === 2 && end.length === 2) {
                        wallyMatrix.push({
                            type: 'line',
                            x1: parseFloat(start[0]),
                            y1: parseFloat(start[1]),
                            x2: parseFloat(end[0]),
                            y2: parseFloat(end[1])
                        });
                        logText += `-> Extracted LINE: Start(${start[0]}, ${start[1]}), End(${end[0]}, ${end[1]})<br>`;
                        entityCount++;
                    }
                }
            }
            
            // 2. INTERPRET: BOX
            else if (line.startsWith("Wally Box")) {
                let params = line.replace("Wally Box", "").trim().split("/");
                if (params.length === 2) {
                    let origin = params[0].split(",");
                    let dims = params[1].split(",");
                    if (origin.length === 2 && dims.length === 2) {
                        wallyMatrix.push({
                            type: 'box',
                            x: parseFloat(origin[0]),
                            y: parseFloat(origin[1]),
                            w: parseFloat(dims[0]),
                            h: parseFloat(dims[1])
                        });
                        logText += `-> Extracted BOX: Origin(${origin[0]}, ${origin[1]}), Span(${dims[0]}x, ${dims[1]}y)<br>`;
                        entityCount++;
                    }
                }
            }
            
            // 3. INTERPRET: CIRCLE
            else if (line.startsWith("Wally Circle")) {
                let params = line.replace("Wally Circle", "").trim().split("/");
                if (params.length === 2) {
                    let center = params[0].split(",");
                    let r = parseFloat(params[1].trim());
                    if (center.length === 2 && !isNaN(r)) {
                        wallyMatrix.push({
                            type: 'circle',
                            cx: parseFloat(center[0]),
                            cy: parseFloat(center[1]),
                            r: r
                        });
                        logText += `-> Extracted CIRCLE: Center(${center[0]}, ${center[1]}), Radius(${r})<br>`;
                        entityCount++;
                    }
                }
            }
        });

        // Trigger the canvas render
        renderWallyViewport();

        // Update UI
        if (entityCount > 0) {
            logBox.innerHTML = logText;
            document.getElementById('outputStatus').innerText = `STATUS: SUCCESS (${entityCount} ENTITIES RENDERED)`;
            document.getElementById('outputStatus').style.color = "#388e3c";
        } else {
            logBox.innerHTML = "<strong>COORDINATE LOG:</strong><br><span style='color:#d32f2f;'>Error: No valid coordinates to return.</span>";
            document.getElementById('outputStatus').innerText = "STATUS: ERROR (NO VALID WALLY SYNTAX FOUND)";
            document.getElementById('outputStatus').style.color = "#d32f2f";
        }
    }

    // ----------------------------------------------------
    // THE VIEWPORT RENDERING LOOP
    // ----------------------------------------------------
    function renderWallyViewport() {
        const canvas = document.getElementById('viewport');
        const ctx = canvas.getContext('2d');
        const h = canvas.height;
        
        // 1. Wipe the board clean
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 2. Draw the Datum Grid (Faint Grey)
        ctx.strokeStyle = "#333333";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x < canvas.width; x += scale) {
            ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
        }
        for (let y = 0; y < canvas.height; y += scale) {
            ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();

        // 3. Draw the Origin Axis (Green X/Y lines)
        ctx.strokeStyle = "#1b5e20";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, h); ctx.lineTo(canvas.width, h); // X Axis
        ctx.moveTo(0, 0); ctx.lineTo(0, h);            // Y Axis
        ctx.stroke();

        // 4. Render the active Wally Matrix (White Ink)
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;

        wallyMatrix.forEach(el => {
            ctx.beginPath();
            
            if (el.type === 'line') {
                // Multiply by scale, and subtract from height to invert Y
                ctx.moveTo(el.x1 * scale, h - (el.y1 * scale));
                ctx.lineTo(el.x2 * scale, h - (el.y2 * scale));
            } 
            else if (el.type === 'box') {
                // For rect: x, y (top-left inverted), width, height
                ctx.rect(
                    el.x * scale, 
                    h - (el.y * scale) - (el.h * scale), 
                    el.w * scale, 
                    el.h * scale
                );
            } 
            else if (el.type === 'circle') {
                ctx.arc(
                    el.cx * scale, 
                    h - (el.cy * scale), 
                    el.r * scale, 
                    0, 2 * Math.PI
                );
            }
            
            ctx.stroke();
        });
    }

    // Render an empty grid on initial load
    window.onload = function() {
        renderWallyViewport();
    };
</script>

</body>
</html>
